<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Linkside</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --bg: #FAF7F0;
    --ink: #142621;
    --ink-soft: #4A5A52;
    --gold: #A9873F;
    --gold-faint: rgba(169,135,63,0.35);
    --hairline: rgba(20,38,33,0.12);
  }

  *{ box-sizing: border-box; }

  html{
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body{
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8vh 6vw;
  }

  /* faint vignette to keep the eye centered without imagery */
  body::before{
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(20,38,33,0) 55%, rgba(20,38,33,0.035) 100%);
  }

  .page{
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ---------- Logo (image lockup: mark + wordmark + tagline) ---------- */

  .logo-wrap{
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1254 / 640;
    overflow: hidden;
    opacity: 0;
    animation: rise 1.1s ease-out 0.1s forwards;
  }

  .logo-wrap img{
    width: 100%;
    height: auto;
    display: block;
    /* image is a square 1254x1254 canvas; shift up to frame
       just the bracket mark, wordmark and tagline, cropping
       the empty margin above and below */
    transform: translateY(-30.5%);
  }

  /* ---------- Slogan ---------- */

  .slogan{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 300;
    font-size: clamp(1.35rem, 3.4vw, 1.7rem);
    line-height: 1.45;
    color: var(--ink);
    margin: 2.2rem 0 0;
    max-width: 380px;
    opacity: 0;
    animation: rise 1s ease-out 0.85s forwards;
  }

  /* ---------- Supporting line ---------- */

  .supporting{
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 1.1rem 0 0;
    max-width: 340px;
    opacity: 0;
    animation: rise 1s ease-out 1.1s forwards;
  }

  /* ---------- Form ---------- */

  .interest-form{
    margin-top: 2.8rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    animation: rise 1s ease-out 1.35s forwards;
  }

  .field{
    position: relative;
  }

  .field input[type="email"]{
    width: 100%;
    padding: 14px 4px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hairline);
    outline: none;
    text-align: center;
    transition: border-color 0.3s ease;
  }

  .field input[type="email"]::placeholder{
    color: var(--ink-soft);
    opacity: 0.55;
    font-weight: 400;
  }

  .field input[type="email"]:focus{
    border-bottom-color: var(--gold);
  }

  .field input[type="email"]:focus-visible{
    outline: 1px solid var(--gold-faint);
    outline-offset: 4px;
  }

  .submit-btn{
    margin-top: 6px;
    padding: 14px 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--ink);
    border: 1px solid var(--ink);
    cursor: pointer;
    transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
  }

  .submit-btn:hover{
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }

  .submit-btn:focus-visible{
    outline: 1px solid var(--gold);
    outline-offset: 3px;
  }

  .form-note{
    font-size: 0.72rem;
    color: var(--ink-soft);
    opacity: 0;
    height: 0;
    transition: opacity 0.4s ease;
    margin-top: 2px;
  }

  .form-note.visible{
    opacity: 0.8;
    height: auto;
  }

  /* ---------- Footer ---------- */

  .footer{
    margin-top: 4.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: rise 1s ease-out 1.55s forwards;
  }

  .footer-rule{
    width: 24px;
    height: 1px;
    background: var(--hairline);
  }

  .contact{
    font-family: 'Inter', sans-serif;
    font-size: 0.76rem;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
  }

  .contact a{
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 1px;
    transition: color 0.3s ease, border-color 0.3s ease;
  }

  .contact a:hover{
    color: var(--ink);
    border-color: var(--gold);
  }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(8px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .logo-wrap, .slogan, .supporting, .interest-form, .footer{
      animation: none !important;
      opacity: 1 !important;
    }
    .logo-wrap img{
      transform: translateY(-30.5%) !important;
    }
  }

  @media (max-width: 380px){
    body{ padding: 10vh 8vw; }
  }

</style>
</head>
<body>

  <main class="page">

    <div class="logo-wrap">
      <img src="linkside-logo.png" alt="The Linkside — Work. Connect. Play.">
    </div>

    <p class="slogan">A private club for business professionals who love golf.</p>

    <p class="supporting">Join the early interest list to learn more as the concept develops.</p>

    <!--
      FORM SETUP:
      Replace the placeholder action below with your form handler
      (e.g. Mailchimp, Klaviyo, ConvertKit, or a custom endpoint).
      The JS at the bottom shows the submission message without
      reloading the page — swap the fetch() call for your real endpoint.
    -->
    <form class="interest-form" id="interestForm" action="#" method="POST">
      <div class="field">
        <input
          type="email"
          name="email"
          id="emailInput"
          placeholder="Email address"
          autocomplete="email"
          required
        >
      </div>
      <button type="submit" class="submit-btn">Join the Interest List</button>
      <div class="form-note" id="formNote">Thank you — you're on the list.</div>
    </form>

    <div class="footer">
      <div class="footer-rule"></div>
      <div class="contact">
        <a href="mailto:hello@thelinkside.com">hello@thelinkside.com</a>
      </div>
    </div>

  </main>

<script>
  // --- Google Form connection ---
  // 1. Create a Google Form with one Short Answer question for email.
  // 2. Use "Get pre-filled link" to find your form ID and entry ID.
  // 3. Paste those two values in below.
  const GOOGLE_FORM_ID = '1FAIpQLSdkKJQZwT4AsS5akgdZAcJOHtyjpQ4_93FFXH-R2myJeiLmaQ';
  const GOOGLE_EMAIL_ENTRY_ID = 'PASTE_YOUR_ENTRY_ID_HERE'; // e.g. entry.123456789

  document.getElementById('interestForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const emailInput = document.getElementById('emailInput');
    const note = document.getElementById('formNote');
    const email = emailInput.value.trim();

    if (!email) return;

    const formUrl = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
    const data = new FormData();
    data.append(GOOGLE_EMAIL_ENTRY_ID, email);

    // Google Forms doesn't send CORS headers, so the response is opaque —
    // "no-cors" mode still delivers the submission, we just can't read
    // a confirmation back. That's expected and fine here.
    fetch(formUrl, {
      method: 'POST',
      mode: 'no-cors',
      body: data
    }).catch(() => {
      // Even on a network hiccup, most submissions still land — Google
      // Forms doesn't return a readable status in no-cors mode.
    });

    note.classList.add('visible');
    emailInput.value = '';
    emailInput.blur();
  });
</script>

</body>
</html>
